{% extends 'base.html' %}

{% block guest_content %}
<div class="flex items-center justify-center min-h-[70vh] animate-fade-in-up">
    <div class="glass-card p-8 rounded-3xl w-full max-w-md relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-emerald-400 rounded-full mix-blend-multiply filter blur-xl opacity-20"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-medical-blue rounded-full mix-blend-multiply filter blur-xl opacity-20"></div>
        
        <div class="relative z-10">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-emerald-500 to-teal-300 text-white shadow-lg mb-4">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                </div>
                <h2 class="text-3xl font-bold text-slate-800 mb-2">Registrasi Kader</h2>
                <p class="text-slate-500 text-sm font-medium">Buat akun untuk mendata & memeriksa balita</p>
            </div>

            <form action="{{ url_for('register') }}" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Username</label>
                    <input type="text" name="username" required minlength="4" placeholder="Ketik username baru..."
                        class="w-full px-4 py-3 rounded-xl bg-white/60 border border-slate-300 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition shadow-sm">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                    <input type="password" name="password" required minlength="6" placeholder="Minimal 6 karakter"
                        class="w-full px-4 py-3 rounded-xl bg-white/60 border border-slate-300 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition shadow-sm">
                </div>

                <button type="submit" 
                    class="w-full py-3.5 px-4 mt-2 rounded-xl text-white font-bold text-lg bg-gradient-to-r from-emerald-600 to-teal-400 hover:from-emerald-500 hover:to-teal-300 shadow-xl shadow-emerald-500/30 transform transition hover:-translate-y-1">
                    Daftar Sekarang
                </button>
            </form>

            <div class="mt-8 text-center text-sm font-medium text-slate-600">
                Sudah memiliki akun? <a href="{{ url_for('login') }}" class="text-medical-blue hover:text-medical-dark font-bold underline transition">Login di sini</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
