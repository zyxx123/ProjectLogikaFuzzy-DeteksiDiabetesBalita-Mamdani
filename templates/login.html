{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh] animate-fade-in-up">
    <div class="glass-card p-8 rounded-3xl w-full max-w-md relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-medical-blue rounded-full mix-blend-multiply filter blur-xl opacity-20"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-indigo-300 rounded-full mix-blend-multiply filter blur-xl opacity-20"></div>
        
        <div class="relative z-10">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-medical-blue to-sky-300 text-white shadow-lg mb-4">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path></svg>
                </div>
                <h2 class="text-3xl font-bold text-slate-800 mb-2">Login Sistem</h2>
                <p class="text-slate-500 text-sm font-medium">Sistem Pendukung Keputusan Deteksi Stunting</p>
            </div>

            <form action="{{ url_for('login') }}" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Username</label>
                    <input type="text" name="username" required
                        class="w-full px-4 py-3 rounded-xl bg-white/60 border border-slate-300 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-medical-blue focus:ring-2 focus:ring-medical-blue/20 transition shadow-sm">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                    <input type="password" name="password" required
                        class="w-full px-4 py-3 rounded-xl bg-white/60 border border-slate-300 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-medical-blue focus:ring-2 focus:ring-medical-blue/20 transition shadow-sm">
                </div>

                <button type="submit" 
                    class="w-full py-3.5 px-4 mt-2 rounded-xl text-white font-bold text-lg bg-gradient-to-r from-medical-dark to-medical-blue hover:from-medical-blue hover:to-sky-400 shadow-xl shadow-medical-blue/30 transform transition hover:-translate-y-1">
                    Masuk Ke Sistem
                </button>
            </form>

            <div class="mt-8 p-4 rounded-xl bg-blue-50/50 border border-blue-100 text-sm text-blue-800 text-center shadow-inner mb-4">
                <p class="mb-1">Akun Admin: <b>admin</b> / <b>admin123</b></p>
                <p>Akun Kader: <b>kader</b> / <b>kader123</b></p>
            </div>

            <div class="text-center text-sm font-medium text-slate-600">
                Belum punya akun kader? <a href="{{ url_for('register') }}" class="text-medical-blue hover:text-medical-dark font-bold underline transition">Daftar di sini</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
