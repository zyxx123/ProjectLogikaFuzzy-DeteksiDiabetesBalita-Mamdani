{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="glass-card p-8 rounded-2xl w-full max-w-md shadow-2xl relative overflow-hidden">
        <!-- Decoration -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-medical-blue rounded-full mix-blend-multiply filter blur-xl opacity-20"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-indigo-500 rounded-full mix-blend-multiply filter blur-xl opacity-20"></div>
        
        <div class="relative z-10">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-white mb-2">Login Sistem</h2>
                <p class="text-slate-400 text-sm">Sistem Pendukung Keputusan Deteksi Stunting</p>
            </div>

            <form action="{{ url_for('login') }}" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                    <input type="text" name="username" required
                        class="w-full px-4 py-3 rounded-xl bg-slate-800/50 border border-slate-600 text-white placeholder-slate-500 focus:outline-none focus:border-medical-blue focus:ring-1 focus:ring-medical-blue transition">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                    <input type="password" name="password" required
                        class="w-full px-4 py-3 rounded-xl bg-slate-800/50 border border-slate-600 text-white placeholder-slate-500 focus:outline-none focus:border-medical-blue focus:ring-1 focus:ring-medical-blue transition">
                </div>

                <button type="submit" 
                    class="w-full py-3 px-4 rounded-xl text-white font-semibold bg-gradient-to-r from-medical-dark to-medical-blue hover:from-medical-blue hover:to-sky-400 shadow-lg shadow-medical-blue/30 transform transition hover:-translate-y-0.5">
                    Masuk Ke Sistem
                </button>
            </form>

            <div class="mt-8 p-4 rounded-xl bg-slate-800/50 border border-slate-700 text-xs text-slate-400 text-center">
                <p class="mb-1">Akun Admin: <b>admin</b> / <b>admin123</b></p>
                <p>Akun Kader: <b>kader</b> / <b>kader123</b></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
