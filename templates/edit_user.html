{% extends 'base.html' %}

{% block content %}
<div class="space-y-6 animate-fade-in-up max-w-2xl mx-auto">
    <div class="flex justify-between items-end mb-6">
        <div>
            <h1 class="text-3xl font-bold text-slate-800">Edit Pengguna</h1>
            <p class="text-slate-500 mt-1 font-medium">Perbarui data akun {{ user.username }}.</p>
        </div>
        <a href="{{ url_for('data_user') }}" class="px-5 py-2 text-slate-500 font-medium hover:bg-slate-200 rounded-lg transition">
            Kembali
        </a>
    </div>

    <div class="glass-card rounded-2xl overflow-hidden shadow-sm p-8">
        <form action="{{ url_for('edit_user_route', id_user=user.id) }}" method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Username</label>
                <input type="text" name="username" value="{{ user.username }}" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-medical-blue focus:border-medical-blue outline-none transition">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Role Baru</label>
                <select name="role" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-medical-blue focus:border-medical-blue outline-none transition">
                    <option value="pengguna" {% if user.role == 'pengguna' %}selected{% endif %}>Kader / Pengguna</option>
                    <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Password Baru (Opsional)</label>
                <input type="password" name="password" placeholder="Kosongkan jika tidak ingin diubah" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-medical-blue focus:border-medical-blue outline-none transition">
                <p class="text-xs text-slate-400 mt-1">Biarkan kosong jika Anda hanya ingin mengubah username atau role.</p>
            </div>
            
            <div class="pt-6">
                <button type="submit" class="w-full py-4 bg-medical-blue text-white font-bold text-lg rounded-xl hover:bg-medical-dark transition shadow-md">Simpan Perubahan</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
