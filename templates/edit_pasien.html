{% extends 'base.html' %}

{% block content %}
<h2 class="text-2xl font-bold mb-4">Edit Pasien</h2>

<form method="POST" class="space-y-4 bg-white p-6 rounded-xl">
    
    <input type="text"
           name="nama"
           value="{{ pasien.nama_anak }}"
           class="w-full border p-2 rounded"
           required>

    <select name="jk" class="w-full border p-2 rounded">
        <option value="Laki-laki"
        {% if pasien.jenis_kelamin == 'Laki-laki' %}selected{% endif %}>
        Laki-laki
        </option>

        <option value="Perempuan"
        {% if pasien.jenis_kelamin == 'Perempuan' %}selected{% endif %}>
        Perempuan
        </option>
    </select>

    <input type="date"
           name="tgl_lahir"
           value="{{ pasien.tanggal_lahir }}"
           class="w-full border p-2 rounded"
           required>

    <input type="text"
           name="nama_ortu"
           value="{{ pasien.nama_orang_tua }}"
           class="w-full border p-2 rounded"
           required>

    <button type="submit"
            class="bg-blue-500 text-white px-4 py-2 rounded">
        Simpan Perubahan
    </button>

</form>
{% endblock %}
