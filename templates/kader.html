{% extends 'base.html' %}

{% block content %}
<div class="space-y-8 animate-fade-in-up">
    <div class="text-center max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold text-slate-800 mb-2">Pusat Layanan Posyandu</h1>
        <p class="text-slate-500 font-medium">Silakan pilih menu layanan yang ingin Anda lakukan hari ini.</p>
    </div>

    <!-- Menu Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
        
        <!-- Menu 1 -->
        <a href="{{ url_for('deteksi') }}" class="glass-card p-8 rounded-2xl group border-2 border-transparent hover:border-medical-blue transition duration-300 shadow-sm hover:shadow-lg">
            <div class="w-14 h-14 bg-blue-100 rounded-xl flex items-center justify-center mb-6 group-hover:scale-110 group-hover:bg-medical-blue transition">
                <svg class="w-8 h-8 text-medical-blue group-hover:text-white transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
            </div>
            <h2 class="text-xl font-bold text-slate-800 mb-2">Deteksi Stunting</h2>
            <p class="text-slate-500 text-sm font-medium">Hitung risiko stunting balita menggunakan algoritma Logika Fuzzy Mamdani.</p>
        </a>

        <!-- Menu 2 -->
        <div class="glass-card p-8 rounded-2xl shadow-sm">
            <div class="w-14 h-14 bg-emerald-100 rounded-xl flex items-center justify-center mb-6">
                <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
            </div>
            <h2 class="text-xl font-bold text-slate-800 mb-4">Pendaftaran Pasien</h2>
            
            <form action="{{ url_for('tambah_pasien_route') }}" method="POST" class="space-y-4">
                <input type="text" name="nama" placeholder="Nama Balita" required class="w-full px-4 py-2.5 text-sm rounded-xl bg-white border border-slate-300 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition shadow-sm">
                <div class="grid grid-cols-2 gap-4">
                    <select name="jk" class="w-full px-4 py-2.5 text-sm rounded-xl bg-white border border-slate-300 text-slate-900 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition shadow-sm">
                        <option value="Laki-laki">Laki-laki</option>
                        <option value="Perempuan">Perempuan</option>
                    </select>
                    <input type="date" name="tgl_lahir" required class="w-full px-4 py-2.5 text-sm rounded-xl bg-white border border-slate-300 text-slate-900 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition shadow-sm">
                </div>
                <input type="text" name="nama_ortu" placeholder="Nama Orang Tua" required class="w-full px-4 py-2.5 text-sm rounded-xl bg-white border border-slate-300 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition shadow-sm">
                <button type="submit" class="w-full py-2.5 text-sm font-bold rounded-xl bg-emerald-600 hover:bg-emerald-500 text-white transition shadow-md hover:shadow-lg hover:-translate-y-0.5">Daftarkan Balita</button>
            </form>
        </div>

    </div>

    <!-- Link ke Halaman Riwayat -->
    <div class="text-center mt-8">
        <a href="{{ url_for('riwayat') }}" class="inline-flex items-center gap-2 px-8 py-4 bg-white border-2 border-medical-blue text-medical-dark font-bold rounded-2xl hover:bg-medical-blue hover:text-white transition shadow-sm hover:shadow-lg">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
            Buka Tabel Riwayat Seluruh Pasien Anda
        </a>
    </div>
</div>
{% endblock %}
