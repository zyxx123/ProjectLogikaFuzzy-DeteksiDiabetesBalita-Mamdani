{% extends 'base.html' %}

{% block content %}
<div class="space-y-6 animate-fade-in-up">
    <div class="flex justify-between items-end">
        <div>
            <h1 class="text-3xl font-bold text-slate-800">Pendaftaran Pasien</h1>
            <p class="text-slate-500 mt-1 font-medium">Daftarkan balita baru ke dalam sistem Posyandu</p>
        </div>
        <a href="{{ url_for('data_pasien') }}" class="px-4 py-2 bg-slate-200 text-slate-700 hover:bg-slate-300 font-bold rounded-xl transition shadow-sm">
            Kembali ke Data Pasien
        </a>
    </div>

    <div class="glass-card p-8 rounded-2xl shadow-sm max-w-2xl mx-auto mt-8">
        <div class="w-14 h-14 bg-emerald-100 rounded-xl flex items-center justify-center mb-6">
            <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
        </div>
        <h2 class="text-xl font-bold text-slate-800 mb-6">Formulir Pendaftaran Balita</h2>
        
        <form action="{{ url_for('tambah_pasien_route') }}" method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Nama Lengkap Balita</label>
                <input type="text" name="nama" placeholder="Masukkan nama balita..." required class="w-full px-4 py-3 rounded-xl bg-white border border-slate-300 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition shadow-sm">
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Jenis Kelamin</label>
                    <select name="jk" class="w-full px-4 py-3 rounded-xl bg-white border border-slate-300 text-slate-900 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition shadow-sm">
                        <option value="Laki-laki">Laki-laki</option>
                        <option value="Perempuan">Perempuan</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Tanggal Pendaftaran</label>
                    <input type="date" name="tgl_lahir" required class="w-full px-4 py-3 rounded-xl bg-white border border-slate-300 text-slate-900 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition shadow-sm">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Nama Orang Tua</label>
                <input type="text" name="nama_ortu" placeholder="Masukkan nama orang tua (Ibu/Ayah)..." required class="w-full px-4 py-3 rounded-xl bg-white border border-slate-300 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 transition shadow-sm">
            </div>
            
            <div class="pt-2">
                <button type="submit" class="w-full py-3.5 text-base font-bold rounded-xl bg-emerald-600 hover:bg-emerald-500 text-white transition shadow-md hover:shadow-lg hover:-translate-y-0.5">Simpan Data Balita</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
